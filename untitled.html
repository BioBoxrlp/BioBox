<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ampel-System für Unterricht</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    h1 { text-align: center; }
    .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .zone {
      width: 200px; min-height: 400px; border: 3px solid #333; border-radius: 10px;
      padding: 10px; background: #fff; display: flex; flex-direction: column; gap: 10px;
    }
    .green { background: #b6ffb6; }
    .yellow { background: #fff6b6; }
    .red { background: #ffb6b6; }
    .student {
      padding: 8px; background: #ddd; border-radius: 5px; cursor: grab; text-align: center;
    }
    .highlight { outline: 3px dashed #444; }
    #inputArea { text-align: center; margin: 20px; }
    #inputArea input { padding: 5px; }
    #inputArea button { padding: 5px 10px; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>🚦 Klassen-Ampel-System</h1>
  <div id="inputArea">
    <input type="text" id="nameInput" placeholder="Schülername eingeben">
    <button onclick="addStudent()">Hinzufügen</button>
  </div>

  <div class="container">
    <div class="zone green" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>✅ Grün</h2>
    </div>
    <div class="zone yellow" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>⚠️ Gelb</h2>
    </div>
    <div class="zone red" ondrop="drop(event)" ondragover="allowDrop(event)">
      <h2>⛔ Rot</h2>
    </div>
  </div>

  <script>
    let idCounter = 0;

    function addStudent() {
      const input = document.getElementById("nameInput");
      const name = input.value.trim();
      if (name === "") return;
      const student = document.createElement("div");
      student.className = "student";
      student.innerText = name;
      student.id = "student-" + idCounter++;
      student.draggable = true;
      student.ondragstart = drag;
      document.querySelector(".green").appendChild(student);
      input.value = "";
    }

    function allowDrop(ev) {
      ev.preventDefault();
      if (ev.target.classList.contains("zone")) {
        ev.target.classList.add("highlight");
      }
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      const student = document.getElementById(data);
      if (ev.target.classList.contains("zone")) {
        ev.target.appendChild(student);
        ev.target.classList.remove("highlight");
      }
    }

    document.querySelectorAll(".zone").forEach(zone => {
      zone.addEventListener("dragleave", e => {
        e.target.classList.remove("highlight");
      });
    });
  </script>
</body>
</html>
